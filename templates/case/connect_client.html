{% extends "web/app/app_base.html" %}
{% load i18n %}
{% load static %}
{% block app %}

<section class="app-section py-4">
  <div class="container">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="h3 mb-0">Connect Client</h1>
        <p class="text-muted mb-0">{{ case.name }}</p>
      </div>
      <a href="{% url 'case:case_detail' slug=case.slug %}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-2"></i>Back to Case
      </a>
    </div>

    <!-- Cloud Providers -->
    <div class="row g-4">
      <!-- AWS -->
      <div class="col-12 col-md-4">
        <div class="card shadow-sm h-100">
          <div class="card-body text-center p-4">
            <div class="provider-logo mb-3" style="height: 64px; display: flex; align-items: center; justify-content: center;">
              <img src="{% static 'images/cloud/aws.svg' %}" alt="AWS" style="max-height: 100%; max-width: 100%; object-fit: contain;">
            </div>
            <h2 class="h5 mb-3">Amazon Web Services</h2>
            <a href="{% url 'aws:connect_aws' slug=case.slug %}" class="btn btn-primary">
              <i class="fas fa-plug me-2"></i>Connect AWS
            </a>
          </div>
        </div>
      </div>
      
      <!-- Azure -->
      <div class="col-12 col-md-4">
        <div class="card shadow-sm h-100">
          <div class="card-body text-center p-4">
            <div class="provider-logo mb-3" style="height: 64px; display: flex; align-items: center; justify-content: center;">
              <img src="{% static 'images/cloud/azure.svg' %}" alt="Azure" style="max-height: 100%; max-width: 100%; object-fit: contain;">
            </div>
            <h2 class="h5 mb-3">Microsoft Azure</h2>
            <a href="{% url 'azure:connect_azure' slug=case.slug %}" class="btn btn-primary">
              <i class="fas fa-plug me-2"></i>Connect Azure
            </a>
          </div>
        </div>
      </div>

      <!-- GCP -->
      <div class="col-12 col-md-4">
        <div class="card shadow-sm h-100">
          <div class="card-body text-center p-4">
            <div class="provider-logo mb-3" style="height: 64px; display: flex; align-items: center; justify-content: center;">
              <img src="{% static 'images/cloud/gcp.svg' %}" alt="GCP" style="max-height: 100%; max-width: 100%; object-fit: contain;">
            </div>
            <h2 class="h5 mb-3">Google Cloud Platform</h2>
            <a href="{% url 'gcp:connect_gcp' slug=case.slug %}" class="btn btn-primary">
              <i class="fas fa-plug me-2"></i>Connect GCP
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

{% endblock %}
