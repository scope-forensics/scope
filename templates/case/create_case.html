{% extends "web/app/app_base.html" %}
{% load i18n %}
{% load static %}
{% block app %}

<section class="app-section py-4">
  <div class="container">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="h3 mb-0">Create New Case</h1>
        <p class="text-muted mb-0">Start a new investigation case</p>
      </div>
    </div>

    <!-- Case Form Card -->
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="POST">
          {% csrf_token %}
          
          <div class="mb-4">
            <label for="name" class="form-label fw-medium">Case Name</label>
            <input type="text" 
                   name="name" 
                   id="name" 
                   class="form-control form-control-lg" 
                   placeholder="Enter a name for this case"
                   required>
          </div>

          <div class="mb-4">
            <label for="description" class="form-label fw-medium">Description</label>
            <textarea name="description" 
                      id="description" 
                      class="form-control" 
                      rows="4"
                      placeholder="Provide details about this investigation case"></textarea>
          </div>

          <div class="mb-4">
            <label for="status" class="form-label fw-medium">Status</label>
            <select name="status" id="status" class="form-select">
              <option value="investigating" selected>Investigating</option>
              <option value="closed">Closed</option>
            </select>
          </div>

          <div class="d-flex justify-content-end gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-plus-circle me-2"></i>Create Case
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>

{% endblock %}
