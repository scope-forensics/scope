{% load i18n %}
{% load static %}

<section class="app-section py-5">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-md order-md-last text-center mb-4">
        <img class="img-fluid" src="{% static 'images/cloud/search.svg' %}" alt="Scope Forensics">
      </div>
      <div class="col-md">
        <h1 class="h2 mb-2">Scope Forensics</h1>
        <p class="text-muted mb-4">Open Source Cloud Forensics for Amazon Web Services (AWS). Support for Microsoft Azure and Google Cloud Platform (GCP) coming soon.</p>
        <div class="d-flex gap-2">
          <a href="{% url 'account_signup' %}" class="btn btn-primary">
            <i class="fas fa-user-plus me-2"></i>{% translate "Create account" %}
          </a>
          <a href="{% url 'account_login' %}" class="btn btn-outline-primary">
            <i class="fas fa-sign-in-alt me-2"></i>{% translate "Sign In" %}
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
